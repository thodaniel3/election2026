<div class="containerz">
  <h2>Create Account</h2>

  <!-- ✅ FIXED ID -->
  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="matric" placeholder="Matric Number" required>
    <input type="email" id="email" placeholder="Email" required>
    <!-- ✅ DROPDOWN LEVEL FIX --> <select id="level" required> <option value="" disabled selected>Select Level</option> <option value="100 Level">100 Level</option> <option value="200 Level">200 Level</option> <option value="300 Level">300 Level</option> <option value="400 Level A">400 Level A</option> <option value="400 Level B">400 Level B</option> </select>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Register</button>
  </form>
</div>

    🔐 Password reset
  </a>
