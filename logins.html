<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Restricted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Floating background animation */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            animation: float 12s infinite ease-in-out;
        }

        .bg-circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 15%;
        }

        .bg-circle:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: 10%;
            right: 10%;
            animation-delay: 3s;
        }

        .bg-circle:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 5%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #ffcc00;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin: 10px 0;
        }

        .highlight {
            color: #00e6e6;
            font-weight: bold;
        }

        .countdown {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #ffcc00;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: #e6b800;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>

    <div class="container">
        <h1>Login Restricted</h1>

        <p>
            Access to the voting system is currently <span class="highlight">closed</span>.
        </p>

        <p>
            You can only log in during the official election period.
        </p>

        <p>
            <strong>Login Opens:</strong><br>
            <span class="highlight">2nd May 2026</span>
        </p>

        <div class="countdown" id="countdown">
            Loading countdown...
        </div>

        <a href="index.html" class="btn">Back to Home</a>

        <footer>
            Voting System © 2026
        </footer>
    </div>

    <script>
        const targetDate = new Date("May 2, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("countdown").innerHTML = "Login is now OPEN!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("countdown").innerHTML =
                `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
