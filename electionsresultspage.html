<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  animation: fadeIn 1s ease;
}

.header h1 {
  font-size: 28px;
}

.actions button {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  margin-left: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.print-btn {
  background: #22c55e;
  color: #000;
}

.pdf-btn {
  background: #3b82f6;
  color: #fff;
}

.actions button:hover {
  transform: scale(1.05);
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 25px;
  animation: slideUp 0.6s ease;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background: rgba(255,255,255,0.1);
}

tr:nth-child(even) {
  background: rgba(255,255,255,0.03);
}

tr:hover {
  background: rgba(255,255,255,0.08);
}

.position-title {
  font-size: 20px;
  margin-bottom: 10px;
  color: #38bdf8;
}

.loading {
  text-align: center;
  font-size: 18px;
  margin-top: 50px;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {transform: translateY(20px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* Print */
@media print {
  body {
    background: white;
    color: black;
  }

  .actions {
    display: none;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Election Results Dashboard</h1>
  <div class="actions">
    <button class="print-btn" onclick="window.print()">Print</button>
    <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
  </div>
</div>

<div id="results" class="loading">Loading results...</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://okxnnbryvxsdpadlhlos.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9reG5uYnJ5dnhzZHBhZGxobG9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzA4NDIsImV4cCI6MjA5MTkwNjg0Mn0.zcpScxFict36y_NQLCtLvmk78W-Tneou59p_IwXfixk"
const supabase = createClient(supabaseUrl, supabaseKey)

const resultsDiv = document.getElementById("results")

async function loadResults() {
  resultsDiv.innerHTML = "Loading results..."

  // Fetch positions
  const { data: positions } = await supabase.from("positions").select("*")

  // Fetch candidates
  const { data: candidates } = await supabase.from("candidates").select("*")

  // Fetch votes
  const { data: votes } = await supabase.from("votes").select("*")

  let html = ""

  positions.forEach(position => {
    const positionCandidates = candidates.filter(c => c.position_id === position.id)

    html += `
      <div class="card">
        <div class="position-title">${position.title}</div>
        <table>
          <thead>
            <tr>
              <th>Candidate</th>
              <th>Party</th>
              <th>Votes</th>
            </tr>
          </thead>
          <tbody>
    `

    positionCandidates.forEach(candidate => {
      const voteCount = votes.filter(v => v.candidate_id === candidate.id).length

      html += `
        <tr>
          <td>${candidate.name}</td>
          <td>${candidate.party || "-"}</td>
          <td>${voteCount}</td>
        </tr>
      `
    })

    html += `
          </tbody>
        </table>
      </div>
    `
  })

  resultsDiv.innerHTML = html
}

loadResults()

// PDF Download
window.downloadPDF = async function () {
  const { jsPDF } = window.jspdf
  const doc = new jsPDF()

  doc.text("Election Results", 10, 10)
  doc.html(document.body, {
    callback: function (doc) {
      doc.save("election-results.pdf")
    },
    x: 10,
    y: 20
  })
}
</script>

</body>
</html>
